git:
  pagers:
    - colorArg: always
      # --paging=never 必填：lazygit 自己负责滚动，delta 不能再起分页
      # side-by-side / line-numbers 等外观放到 ~/.gitconfig 的 [delta] 段，
      # 这样命令行与 lazygit 共用同一套 delta 外观配置
      pager: delta --paging=never

# Tokyo Night 配色 + Nerd Fonts 图标（与终端整体配色统一）
gui:
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - "#ff9e64"
      - "bold"
    inactiveBorderColor:
      - "#27a1b9"
    searchingActiveBorderColor:
      - "#ff9e64"
      - "bold"
    optionsTextColor:
      - "#7aa2f7"
    selectedLineBgColor:
      - "#283457"
    cherryPickedCommitFgColor:
      - "#7aa2f7"
    cherryPickedCommitBgColor:
      - "#bb9af7"
    markedBaseCommitFgColor:
      - "#7aa2f7"
    markedBaseCommitBgColor:
      - "#e0af68"
    unstagedChangesColor:
      - "#db4b4b"
    defaultFgColor:
      - "#c0caf5"
