# ~/.config/starship.toml

# ======================================================
# 核心设置
# ======================================================

# 1. 设置超时，防止在巨型 git 仓库卡顿
command_timeout = 1000

# 2. 提示符的整体布局
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$golang\
$docker_context\
$cmd_duration\
$line_break\
$character
"""

# 3. 强制换行，让输入与状态信息分离，保持整洁
[line_break]
disabled = false

# 4. 目录显示
[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = false

# 5. Git 分支
[git_branch]
symbol = "🌿 "
style = "bold purple"
format = 'on [$symbol$branch]($style) '

# 6. 命令执行时间
[cmd_duration]
min_time = 500
format = "took [⏳ $duration]($style) "
style = "bold yellow"

# 7. 用户名与主机名
[username]
show_always = false # 建议只在 SSH 时显示，本地保持简洁
style_user = "bold yellow"
style_root = "bold red"
format = "[$user]($style)@[$hostname](bold blue) "

[hostname]
disabled = true # 建议禁用

# ======================================================
# 模块配置
# ======================================================

# 8. Golang 配置
[golang]
symbol = "🐹 "
style = "bold green"
format = '[[ $symbol($version) ](bold green)]($style)'
detect_files = ["go.mod", "go.work"]

# 9. Docker 配置
[docker_context]
symbol = "🐳 "
format = "[$symbol$context]($style) "

# 10. 极简的字符样式
[character]
success_symbol = "[➜](bold green)"
error_symbol = "[✗](bold red)"

# 11. Git 状态微调
[git_status]
format = '([\[$all_status$ahead_behind\]]($style))'
deleted = "✘"
modified = "!"
staged = "+"
renamed = "»"
untracked = "?"